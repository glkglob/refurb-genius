<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Refurb Genius</title>
    <meta name="description" content="AI-powered refurbishment analysis for UK property investors." />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu',
          'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        background-color: #f5f5f5;
        color: #333;
      }
      #root {
        width: 100%;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- TanStack Start client entry - loads React app and connects to backend -->
    <script type="module" src="/@vite/client"></script>
    <script type="module">
      // This is a bootstrap entry for Capacitor.
      // The actual app routing/rendering is handled by TanStack Start.
      import('./assets/client.js').catch((err) => {
        console.error('Failed to load app:', err);
        document.getElementById('root').innerHTML =
          '<div style="padding: 20px; text-align: center;"><h1>App Load Error</h1><p>Please restart the app.</p></div>';
      });
    </script>
  </body>
</html>
