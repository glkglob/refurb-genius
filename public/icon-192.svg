<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#1f2937"/>

  <!-- Rounded corners -->
  <rect width="192" height="192" rx="45" ry="45" fill="#1f2937"/>

  <!-- Primary accent circle -->
  <circle cx="96" cy="96" r="70" fill="#3b82f6"/>

  <!-- Refurb icon: house with arrow -->
  <g transform="translate(96, 96)">
    <!-- House shape -->
    <path d="M -30 -5 L 0 -35 L 30 -5 L 30 25 L -30 25 Z" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Door -->
    <rect x="-10" y="5" width="8" height="20" fill="#1f2937"/>
    <circle cx="-6" cy="15" r="1.5" fill="#3b82f6"/>

    <!-- Window -->
    <rect x="8" y="0" width="12" height="12" fill="#1f2937"/>

    <!-- Arrow showing upward trend -->
    <path d="M -20 20 L -10 10 L -8 15 L 10 15" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="-8,15 -3,8 -13,10" fill="white"/>
  </g>

  <!-- Shadow/depth effect -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>
